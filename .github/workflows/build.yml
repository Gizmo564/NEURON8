name: Build and Release Neuron 8

# Fires when you push a tag like v1.0.0
on:
  push:
    tags:
      - 'v*'

jobs:

  # ── macOS ────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: "NeuroSuite_V8/Neuron8 Base"
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tkinter
        run: brew install python-tk@3.12 || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy Pillow matplotlib pyinstaller

      - name: Generate .icns icon from PNG
        run: |
          python3 - << 'PYEOF'
          import struct, io
          from PIL import Image
          img = Image.open('assets/neuron8.png').convert('RGBA')
          icns_types = {16:b'icp4',32:b'icp5',64:b'icp6',128:b'ic07',256:b'ic08',512:b'ic09',1024:b'ic10'}
          chunks = []
          for size, ostype in icns_types.items():
              buf = io.BytesIO()
              img.resize((size,size), Image.LANCZOS).save(buf, format='PNG')
              data = buf.getvalue()
              chunks.append(ostype + struct.pack('>I', 8+len(data)) + data)
          body = b''.join(chunks)
          with open('assets/neuron8.icns','wb') as f:
              f.write(b'icns' + struct.pack('>I', 8+len(body)) + body)
          print("OK assets/neuron8.icns")
          PYEOF

      - name: Download ffplay for macOS
        run: |
          mkdir -p ffplay_bin/macos
          curl -fsSL "https://evermeet.cx/ffmpeg/getrelease/ffplay/zip" \
               -o /tmp/ffplay_mac.zip
          unzip -o /tmp/ffplay_mac.zip -d ffplay_bin/macos/
          chmod +x ffplay_bin/macos/ffplay
          ffplay_bin/macos/ffplay -version 2>&1 | head -1

      - name: Build with PyInstaller
        run: python -m PyInstaller neuron8.spec --noconfirm

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "Neuron 8" \
            -srcfolder dist/Neuron8.app \
            -ov -format UDZO \
            dist/Neuron8_macOS.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Neuron8-macOS
          path: "NeuroSuite_V8/Neuron8 Base/dist/Neuron8_macOS.dmg"
          retention-days: 7

  # ── Linux ────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "NeuroSuite_V8/Neuron8 Base"
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk xvfb ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy Pillow matplotlib pyinstaller

      - name: Generate .ico icon from PNG
        run: |
          python3 - << 'PYEOF'
          from PIL import Image
          img = Image.open('assets/neuron8.png').convert('RGBA')
          img.save('assets/neuron8.ico', format='ICO',
                   sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          print("OK assets/neuron8.ico")
          PYEOF

      - name: Get ffplay binary
        run: |
          mkdir -p ffplay_bin/linux
          cp $(which ffplay) ffplay_bin/linux/ffplay
          chmod +x ffplay_bin/linux/ffplay
          ffplay_bin/linux/ffplay -version 2>&1 | head -1

      - name: Build with PyInstaller
        run: python -m PyInstaller neuron8.spec --noconfirm

      - name: Create tar.gz
        run: cd dist && tar -czf Neuron8_linux.tar.gz Neuron8/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Neuron8-Linux
          path: "NeuroSuite_V8/Neuron8 Base/dist/Neuron8_linux.tar.gz"
          retention-days: 7

  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: "NeuroSuite_V8/Neuron8 Base"
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy Pillow matplotlib pyinstaller

      - name: Generate .ico icon from PNG
        shell: pwsh
        run: |
          python -c "
          from PIL import Image
          img = Image.open('assets/neuron8.png').convert('RGBA')
          img.save('assets/neuron8.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          print('OK assets/neuron8.ico')
          "

      - name: Download ffplay for Windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "ffplay_bin\windows"
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          Write-Host "Downloading: $url"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\ffmpeg_win.zip"
          Expand-Archive -Path "$env:TEMP\ffmpeg_win.zip" -DestinationPath "$env:TEMP\ffmpeg_win" -Force
          $ffplay = Get-ChildItem -Path "$env:TEMP\ffmpeg_win" -Recurse -Filter "ffplay.exe" | Select-Object -First 1
          Copy-Item $ffplay.FullName -Destination "ffplay_bin\windows\ffplay.exe"
          & "ffplay_bin\windows\ffplay.exe" -version 2>&1 | Select-Object -First 1

      - name: Build with PyInstaller
        run: python -m PyInstaller neuron8.spec --noconfirm

      - name: Create ZIP
        shell: pwsh
        run: Compress-Archive -Path "dist\Neuron8" -DestinationPath "dist\Neuron8_windows.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Neuron8-Windows
          path: "NeuroSuite_V8/Neuron8 Base/dist/Neuron8_windows.zip"
          retention-days: 7

  # ── Create GitHub Release ─────────────────────────────────────────────────────
  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release and upload files
        uses: softprops/action-gh-release@v2
        with:
          name: "Neuron 8 ${{ github.ref_name }}"
          body: |
            ## Neuron 8 ${{ github.ref_name }}

            ### Download for your platform:
            | Platform | File | Instructions |
            |----------|------|--------------|
            | 🍎 macOS | `Neuron8_macOS.dmg` | Mount the DMG, drag Neuron8.app to Applications |
            | 🐧 Linux | `Neuron8_linux.tar.gz` | Extract and run `./Neuron8/Neuron8` |
            | 🪟 Windows | `Neuron8_windows.zip` | Extract and double-click `Neuron8.exe` |

            > **macOS:** If Gatekeeper blocks the app, right-click → Open, or run `xattr -cr Neuron8.app`
            >
            > **Windows:** If SmartScreen appears, click "More info" → "Run anyway"
          files: |
            artifacts/Neuron8-macOS/Neuron8_macOS.dmg
            artifacts/Neuron8-Linux/Neuron8_linux.tar.gz
            artifacts/Neuron8-Windows/Neuron8_windows.zip
          draft: false
          prerelease: false
